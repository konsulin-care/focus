name: 'Electron Build Common'
description: 'Common build steps for Electron app on any platform'

inputs:
  node-version:
    description: 'Node.js version (kept for backward compatibility but not used)'
    required: false
    default: '20'

runs:
  using: 'composite'
  steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        persist-credentials: false

    - name: Cache native module build
      uses: actions/cache@v4
      with:
        path: node_modules/.node-gyp
        key: ${{ runner.os }}-node-gyp-${{ hashFiles('package.json') }}
        restore-keys: |
          ${{ runner.os }}-node-gyp-

    - name: Install npm dependencies
      shell: bash
      run: |
        set -e
        npm ci

    - name: Rebuild native modules for Electron
      shell: bash
      run: |
        set -e
        npm run electron-rebuild

    - name: Generate main config from secrets
      if: env.RECOVERY_WEBHOOK_SECRET != ''
      shell: bash
      env:
        RECOVERY_WEBHOOK_URL: ${{ secrets.RECOVERY_WEBHOOK_URL }}
        RECOVERY_WEBHOOK_SECRET: ${{ secrets.RECOVERY_WEBHOOK_SECRET }}
      run: |
        node -e "\
          const fs = require('fs'); \
          const cfg = { \
            RECOVERY_WEBHOOK_URL: process.env.RECOVERY_WEBHOOK_URL, \
            RECOVERY_WEBHOOK_SECRET: process.env.RECOVERY_WEBHOOK_SECRET \
          }; \
          fs.writeFileSync('src/main/generated-config.ts', 'export const CONFIG = ' + JSON.stringify(cfg) + ';'); \
        "

    - name: Build TypeScript
      shell: bash
      run: |
        set -e
        npm run build:main

    - name: Copy config to dist
      shell: bash
      run: |
        cp src/main/generated-config.ts dist/main/generated-config.ts

    - name: Create .env for renderer
      shell: bash
      env:
        VITE_RECOVERY_WEBHOOK_URL: ${{ secrets.RECOVERY_WEBHOOK_URL }}
        VITE_RECOVERY_WEBHOOK_SECRET: ${{ secrets.RECOVERY_WEBHOOK_SECRET }}
      run: |
        echo "VITE_RECOVERY_WEBHOOK_URL=${VITE_RECOVERY_WEBHOOK_URL}" >> .env
        echo "VITE_RECOVERY_WEBHOOK_SECRET=${VITE_RECOVERY_WEBHOOK_SECRET}" >> .env

    - name: Build Renderer
      shell: bash
      run: |
        set -e
        npm run build:renderer
